AWSTemplateFormatVersion: '2010-09-09'
Description: Liminal - CloudFront distribution for the Axis web proxy

Parameters:
  OriginDomain:
    Type: String

Resources:

  NoCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: LiminalNoCache
        Comment: No caching - for dynamic routes and WebSocket pass-through
        DefaultTTL: 0
        MinTTL: 0
        MaxTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          EnableAcceptEncodingGzip: false
          EnableAcceptEncodingBrotli: false
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  StaticCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: LiminalStaticAssets
        Comment: Long-lived cache for versioned proxy library assets
        DefaultTTL: 604800
        MinTTL: 0
        MaxTTL: 31536000
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: Liminal / Axis web proxy
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Origins:
          - Id: ElasticBeanstalk
            DomainName: !Ref OriginDomain
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
              OriginKeepaliveTimeout: 60
              OriginReadTimeout: 60
        DefaultCacheBehavior:
          TargetOriginId: ElasticBeanstalk
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachePolicyId: !Ref NoCachePolicy
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        CacheBehaviors:
          - PathPattern: /scramjet/*
            TargetOriginId: ElasticBeanstalk
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachePolicyId: !Ref StaticCachePolicy
          - PathPattern: /baremux/*
            TargetOriginId: ElasticBeanstalk
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachePolicyId: !Ref StaticCachePolicy
          - PathPattern: /epoxy/*
            TargetOriginId: ElasticBeanstalk
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachePolicyId: !Ref StaticCachePolicy
          - PathPattern: /libcurl/*
            TargetOriginId: ElasticBeanstalk
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachePolicyId: !Ref StaticCachePolicy
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
          MinimumProtocolVersion: TLSv1.2_2021

Outputs:
  DistributionUrl:
    Value: !Sub https://${Distribution.DomainName}
  DistributionId:
    Value: !Ref Distribution
