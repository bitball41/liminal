AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IAM role for GitHub Actions OIDC — grants exactly the permissions needed
  by .github/workflows/deploy.yml to deploy Liminal to Elastic Beanstalk
  and update the LiminalStack CloudFront distribution.

  Deploy once (replacing the placeholder parameters), then set AWS_ROLE_ARN
  in your GitHub repo secrets to the RoleArn output.

  aws cloudformation deploy \
    --template-file infra/github-actions-policy.yaml \
    --stack-name LiminalGitHubRole \
    --capabilities CAPABILITY_NAMED_IAM \
    --parameter-overrides \
        GitHubOrg=<your-github-org-or-user> \
        GitHubRepo=<your-repo-name> \
        EBBucket=<your-eb-s3-bucket> \
        EBAppName=<your-eb-app-name> \
        EBEnvName=<your-eb-env-name>

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organisation or username (e.g. WhopperCat)
  GitHubRepo:
    Type: String
    Description: GitHub repository name (e.g. liminal)
  EBBucket:
    Type: String
    Description: S3 bucket used for Elastic Beanstalk source bundles
  EBAppName:
    Type: String
    Description: Elastic Beanstalk application name
  EBEnvName:
    Type: String
    Description: Elastic Beanstalk environment name

Resources:

  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${GitHubRepo}-github-deploy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOIDCProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  !Sub repo:${GitHubOrg}/${GitHubRepo}:*
      Policies:
        - PolicyName: LiminalDeploy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:

              # ── S3: upload EB source bundle ──────────────────────────────
              # EB reads the bundle object's ACL during deploy, so GetObjectAcl
              # (and PutObjectAcl on upload) are required in addition to Get/Put.
              - Sid: S3SourceBundle
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:GetObject
                  - s3:GetObjectAcl
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${EBBucket}
                  - !Sub arn:aws:s3:::${EBBucket}/*

              # ── Elastic Beanstalk ────────────────────────────────────────
              - Sid: ElasticBeanstalk
                Effect: Allow
                Action:
                  - elasticbeanstalk:CreateApplicationVersion
                  - elasticbeanstalk:CreateStorageLocation
                  - elasticbeanstalk:UpdateEnvironment
                  - elasticbeanstalk:DescribeEnvironments
                  - elasticbeanstalk:DescribeEnvironmentResources
                  - elasticbeanstalk:DescribeEnvironmentHealth
                  - elasticbeanstalk:DescribeInstancesHealth
                  - elasticbeanstalk:DescribeEvents
                  - elasticbeanstalk:DescribeApplicationVersions
                  - elasticbeanstalk:DescribeConfigurationSettings
                  - elasticbeanstalk:DescribeConfigurationOptions
                  - elasticbeanstalk:DescribeEnvironmentManagedActions
                  - elasticbeanstalk:DescribeEnvironmentManagedActionHistory
                  - elasticbeanstalk:RequestEnvironmentInfo
                  - elasticbeanstalk:RetrieveEnvironmentInfo
                  - elasticbeanstalk:ListPlatformVersions
                  - elasticbeanstalk:ListAvailableSolutionStacks
                Resource: '*'

              # ── EB deploy dependencies ───────────────────────────────────
              # During UpdateEnvironment, EB performs these queries as the
              # deploying principal. All read-only describes except the
              # CloudWatch/SNS actions EB uses for health alarms + notifications.
              # Deliberately NO iam:* write actions, so there is no
              # privilege-escalation path even if the runner is compromised
              # (this replaces the broad AdministratorAccess-AWSElasticBeanstalk
              # managed policy, which granted iam:CreateRole/AttachRolePolicy).
              - Sid: ElasticBeanstalkDependencies
                Effect: Allow
                Action:
                  - autoscaling:Describe*
                  - ec2:Describe*
                  - elasticloadbalancing:Describe*
                  - cloudformation:GetTemplate
                  - cloudformation:ListStackResources
                  - cloudwatch:Describe*
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:ListMetrics
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - sns:Get*
                  - sns:List*
                  - sns:CreateTopic
                  - sns:Subscribe
                  - sns:SetTopicAttributes
                  - logs:Describe*
                  - logs:Get*
                Resource: '*'

              # ── CloudFormation: deploy LiminalStack ──────────────────────
              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:GetTemplateSummary
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeChangeSet
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                Resource: '*'

              # ── CloudFront: manage distribution + invalidate cache ───────
              - Sid: CloudFront
                Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:TagResource
                  - cloudfront:CreateCachePolicy
                  - cloudfront:GetCachePolicy
                  - cloudfront:UpdateCachePolicy
                  - cloudfront:CreateInvalidation
                Resource: '*'

              # ── IAM: CloudFormation needs to pass roles to CloudFront ────
              - Sid: IAMPassRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/*
                Condition:
                  StringEquals:
                    iam:PassedToService: cloudformation.amazonaws.com

Outputs:
  RoleArn:
    Description: Set this as AWS_ROLE_ARN in your GitHub repo secrets
    Value: !GetAtt GitHubDeployRole.Arn
  RoleName:
    Value: !Ref GitHubDeployRole
