# nginx reverse-proxy config for Axis
# Place at: /etc/nginx/conf.d/axis.conf

server {
    listen 80 default_server;
    server_name _;

    # Long timeout needed for persistent WISP WebSocket connections
    proxy_read_timeout    86400s;
    proxy_send_timeout    86400s;
    proxy_connect_timeout 10s;

    # Forward real client IP so logs are useful
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host             $host;

    # ── WISP WebSocket endpoint ─────────────────────────────────────
    location /wisp/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Everything else (static files + SSE) ───────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        # Pass through upgrade headers so any other WS connections work too
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }
}

# Required to make the $connection_upgrade variable work
map $http_upgrade $connection_upgrade {
    default  "upgrade";
    ""       "close";
}
